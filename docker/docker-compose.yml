services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://tts:tts@postgres:5432/tts
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=/data/storage
      - DEVICE=cpu
      - DEBUG=true
    volumes:
      - storage:/data/storage
      - models:/data/models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "celery", "-A", "app.workers.tasks", "worker", "--loglevel=info"]
    environment:
      - DATABASE_URL=postgresql://tts:tts@postgres:5432/tts
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=/data/storage
      - DEVICE=cpu
      - DEBUG=true
    volumes:
      - storage:/data/storage
      - models:/data/models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=tts
      - POSTGRES_PASSWORD=tts
      - POSTGRES_DB=tts
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tts"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  storage:
  models:
  pgdata:
